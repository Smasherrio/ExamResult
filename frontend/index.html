<!DOCTYPE html>
<html>
<head>
  <title>Exam Result DApp</title>
</head>

<body>

<h2>Exam Result System</h2>

<h3>Add Result</h3>

<input id="studentId" placeholder="Student ID"/>
<input id="subject" placeholder="Subject"/>
<input id="marks" placeholder="Marks"/>

<button onclick="addResult()">Submit Result</button>

<h3>Check Result</h3>

<input id="studentIdGet" placeholder="Student ID"/>
<input id="subjectGet" placeholder="Subject"/>

<button onclick="getResult()">Get Result</button>

<p id="output"></p>

<script type="module" src="app.js"></script>

</body>
</html>
